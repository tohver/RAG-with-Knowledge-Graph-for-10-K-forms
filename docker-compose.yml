services:
  neo4j:
    image: neo4j:5
    container_name: neo4j-graphrag
    restart: unless-stopped
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/password}
      # COMBINED PLUGINS
      - NEO4J_PLUGINS=["apoc","genai","graph-data-science"]
      # MERGED UNRESTRICTED & ALLOWLIST (Crucial Fix)
      - NEO4J_dbms_security_procedures_unrestricted=gds.*,apoc.*,genai.*
      - NEO4J_dbms_security_procedures_allowlist=gds.*,apoc.*,genai.*
      # APOC SETTINGS
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
    volumes:
      - ./data:/data
      - ./logs:/logs
      - ./plugins:/plugins
      - ./import:/import

  python_app:
    build: .
    container_name: python_rag
    volumes:
      - .:/app
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=password
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      neo4j:
        condition: service_healthy
    stdin_open: true
    tty: true